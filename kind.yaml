# kind cluster for live-mutex.distributed (TypeScript broker, Maekawa-like cluster)
#
# Topology: 1 control-plane + 3 workers -> a 3-node Maekawa broker set
# (node-1/node-2/node-3). Default broker port is 6970 (DEFAULT_BROKER_PORT);
# the HTTP listener is set via LMX_HTTP_PORT (6971 here).
#
# Hardening:
#   - All published host ports bind to 127.0.0.1 (listenAddress) so the broker
#     listeners are reachable only from this machine, never the LAN. Change the
#     listenAddress to 0.0.0.0 only if you deliberately need off-host access.
#   - The API server also binds loopback (networking.apiServerAddress).
#
# Usage:
#   kind create cluster --config kind.yaml
#   kubectl --context kind-live-mutex-distributed get nodes
#   kind delete cluster --name live-mutex-distributed
#
# Worker nodes are labelled lmx-node=node-1|node-2|node-3 so each broker can be
# pinned to a stable peer identity with a nodeSelector. Inter-broker (peer)
# traffic stays pod-to-pod inside the cluster network; only the external client
# listeners are exposed on the host:
#   node-1 -> host tcp 6970, http 6971
#   node-2 -> host tcp 6972, http 6973
#   node-3 -> host tcp 6974, http 6975
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: live-mutex-distributed
networking:
  apiServerAddress: "127.0.0.1"
nodes:
  - role: control-plane
  - role: worker
    labels:
      lmx-node: node-1
    extraPortMappings:
      - containerPort: 6970
        hostPort: 6970
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 6971
        hostPort: 6971
        listenAddress: "127.0.0.1"
        protocol: TCP
  - role: worker
    labels:
      lmx-node: node-2
    extraPortMappings:
      - containerPort: 6970
        hostPort: 6972
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 6971
        hostPort: 6973
        listenAddress: "127.0.0.1"
        protocol: TCP
  - role: worker
    labels:
      lmx-node: node-3
    extraPortMappings:
      - containerPort: 6970
        hostPort: 6974
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 6971
        hostPort: 6975
        listenAddress: "127.0.0.1"
        protocol: TCP
